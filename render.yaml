# ── Render Blueprint ──────────────────────────────────────────────────────────
# Two services:
#  1. neuralnetwork-api  — FastAPI backend (Python web service)
#  2. neuralnetwork-ui   — Vite/React frontend (static site)
#
# After first deploy, set these env vars in the Render dashboard:
#  • neuralnetwork-api  → FRONTEND_URL = https://<your-ui-name>.onrender.com
#  • neuralnetwork-ui   → VITE_API_BASE_URL = https://<your-api-name>.onrender.com
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI ───────────────────────────────────────────────────────
  - type: web
    name: neuralnetwork-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        sync: false   # Set manually in Render dashboard after first deploy

  # ── Frontend: Vite/React static site ──────────────────────────────────────
  - type: static
    name: neuralnetwork-ui
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # Set manually in Render dashboard after first deploy
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — send all unmatched paths to index.html
      - type: rewrite
        source: /*
        destination: /index.html
