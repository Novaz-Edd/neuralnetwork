# ── Render Blueprint ──────────────────────────────────────────────────────────
# Single web service: FastAPI serves both the API and the compiled React app.
# Build step: install Python deps + build the Vite frontend into frontend/dist/
# FastAPI then mounts frontend/dist/ and serves index.html for all non-API routes.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: neuralnetwork
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
